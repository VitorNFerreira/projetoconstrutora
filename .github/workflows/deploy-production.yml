name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      - name: Apply Prisma migrations on Supabase Production
        run: npm run db:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      - name: Verify Docker for Cloudflare Containers
        run: docker info

      - name: Sync API secrets to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          PRODUCTION_JWT_SECRET: ${{ secrets.PRODUCTION_JWT_SECRET }}
          PRODUCTION_APP_URL: ${{ secrets.PRODUCTION_APP_URL }}
        run: |
          printf '%s' "$PRODUCTION_DATABASE_URL" | npx wrangler secret put DATABASE_URL --config apps/api/wrangler.jsonc
          printf '%s' "$PRODUCTION_DIRECT_URL" | npx wrangler secret put DIRECT_URL --config apps/api/wrangler.jsonc
          printf '%s' "$PRODUCTION_JWT_SECRET" | npx wrangler secret put JWT_SECRET --config apps/api/wrangler.jsonc
          printf '%s' "$PRODUCTION_APP_URL" | npx wrangler secret put CORS_ORIGIN --config apps/api/wrangler.jsonc

      - name: Deploy API to Cloudflare Containers
        run: npx wrangler deploy --config apps/api/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web to Cloudflare Workers
        run: npm run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
